name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

# Cancel in-progress runs when a new push arrives for the same branch/PR.
# Tagged releases are never cancelled so release builds always complete.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    env:
      HAS_MUSICKIT_KEY: ${{ secrets.MUSICKIT_PRIVATE_KEY != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            arch_label: Apple-Silicon
          - os: macos-latest
            platform: mac
            arch: x64
            arch_label: Intel
          - os: ubuntu-latest
            platform: linux
            arch: x64
            arch_label: ''
          - os: windows-latest
            platform: win
            arch: x64
            arch_label: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # macOS: Import code signing certificate into keychain BEFORE the build
      # so it's available during prebuild (native helper signing) as well as
      # electron-builder's own signing step.
      - name: Import Code Signing Certificate
        if: matrix.platform == 'mac' && env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 12)"

          # Decode the certificate from base64
          echo "$CSC_LINK" | base64 --decode > "$CERTIFICATE_PATH"

          # Create and configure a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$CERTIFICATE_PATH" \
            -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the key without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to the search list (keep existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "Code signing certificate imported successfully"

      # Restore MusicKit private key from secret (enables auto token generation)
      - name: Restore MusicKit key
        if: env.HAS_MUSICKIT_KEY == 'true'
        env:
          MUSICKIT_PRIVATE_KEY: ${{ secrets.MUSICKIT_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p resources/keys
          echo "$MUSICKIT_PRIVATE_KEY" > resources/keys/AuthKey_437JVHZMMK.p8

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Cache electron-builder binary downloads (NSIS, winCodeSign, electron zip)
      # to avoid transient GitHub download failures during the build step.
      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron-builder\Cache
            ~/Library/Caches/electron-builder
            ~/.cache/electron-builder
          key: electron-builder-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ runner.os }}-

      # Wrap codesign with retry logic for transient Apple timestamp server failures
      - name: Setup codesign retry wrapper
        if: matrix.platform == 'mac'
        run: |
          mkdir -p "$HOME/.local/bin"
          cp scripts/codesign-retry.sh "$HOME/.local/bin/codesign"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }} -- --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization — only on tagged releases
          APPLE_ID: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_TEAM_ID || '' }}

      # macOS: Notarize and staple the DMG so Gatekeeper on macOS Sequoia
      # accepts the downloaded disk image (not just the .app inside it).
      - name: Notarize DMG
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/notarize-artifacts.js

      # Rename Mac DMGs with friendly arch labels for human-facing download links.
      # IMPORTANT: Only rename the DMG (the manual download artifact). Do NOT
      # rename the .zip or .blockmap files, and do NOT touch the YAML manifests —
      # electron-updater identifies arm64 builds by checking for "arm64" in the
      # filename/URL, so renaming those breaks auto-update on Apple Silicon.
      - name: Rename Mac DMG with friendly arch label
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          cd dist
          label="${{ matrix.arch_label }}"
          for f in *.dmg; do
            [ -e "$f" ] || continue
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              newname=$(echo "$f" | sed "s/-arm64/-arm64-${label}/")
            elif [ "${{ matrix.arch }}" = "x64" ]; then
              newname=$(echo "$f" | sed "s/\.dmg$/-${label}.dmg/")
            fi
            if [ -n "$newname" ] && [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
              echo "Renamed $f -> $newname"
            fi
          done

      # Upload YAML manifests separately per platform/arch so they don't
      # overwrite each other when downloaded with merge-multiple.
      - name: Upload YAML manifest
        if: hashFiles('dist/*.yml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.yml
          retention-days: 30

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parachord-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.pkg.outputs.version }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: parachord-*
          path: artifacts
          merge-multiple: true

      # Download all YAML manifests into separate subdirectories so
      # per-arch files with the same name don't overwrite each other.
      - name: Download manifests
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-*
          path: manifests

      # Each Mac arch build produces its own latest-mac.yml containing only
      # that arch's files.  electron-updater expects a single latest-mac.yml
      # with entries for BOTH architectures so it can pick the right one.
      # Merge them here; non-Mac manifests are just copied through.
      - name: Merge manifests
        shell: bash
        run: |
          # Copy all non-Mac manifests directly into artifacts/
          find manifests -name '*.yml' ! -name 'latest-mac.yml' -exec cp {} artifacts/ \;

          # Merge Mac manifests
          MAC_FILES=$(find manifests -name 'latest-mac.yml' | sort)
          COUNT=$(echo "$MAC_FILES" | wc -l)

          if [ "$COUNT" -ge 2 ]; then
            echo "Merging $COUNT latest-mac.yml manifests..."
            # Use the first file as the base, append 'files' entries from the rest.
            # latest-mac.yml is a YAML file with a top-level 'files' array.
            BASE=$(echo "$MAC_FILES" | head -1)
            cp "$BASE" artifacts/latest-mac.yml

            for f in $MAC_FILES; do
              [ "$f" = "$BASE" ] && continue
              # Append file entries (lines starting with spaces under "files:")
              sed -n '/^files:/,/^[^ ]/{ /^  /p }' "$f" >> artifacts/latest-mac.yml
            done

            echo "Merged latest-mac.yml:"
            cat artifacts/latest-mac.yml
          elif [ "$COUNT" -eq 1 ]; then
            cp $MAC_FILES artifacts/latest-mac.yml
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
